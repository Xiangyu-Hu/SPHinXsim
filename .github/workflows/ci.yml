name: CI

on:
  push:
    branches: [main, master]
    paths:
       - 'examples/**'
       - 'tests/**'
       - 'sphinxsim/**'
       - 'CMakeLists.txt'
       - '*.cmake'
  pull_request:
    branches: [main, master]
    paths:
       - 'examples/**'
       - 'tests/**'
       - 'sphinxsim/**'
       - 'CMakeLists.txt'
       - '*.cmake'
  workflow_dispatch:

env:
  VCPKG_VERSION: "2024.11.16"

jobs:
  build-and-test:
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    env:
      VCPKG_DEFAULT_TRIPLET: x64-linux
      SPHINXSIM_LLM_PROVIDER: mock
      PYTHONDONTWRITEBYTECODE: "1"

    steps:
      - name: Checkout repository (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up CMake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: "3.x"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            apt-utils \
            build-essential \
            curl zip unzip tar \
            pkg-config \
            git \
            ninja-build \
            autoconf automake autoconf-archive \
            libxmu-dev libxi-dev libgl-dev libxt-dev \
            libvtk9-dev

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-${{ runner.os }}

      - name: Set up vcpkg
        uses: friendlyanon/setup-vcpkg@v1
        with:
          committish: ${{ env.VCPKG_VERSION }}
          cache-version: ${{ env.VCPKG_VERSION }}

      - name: Install C++ dependencies via vcpkg
        run: |
          # openblas with dynamic-arch avoids -march=native conflicts with ccache
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            openblas[dynamic-arch] --allow-unsupported
          ${{ github.workspace }}/vcpkg/vcpkg install --clean-after-build \
            eigen3 \
            tbb \
            boost-program-options \
            boost-geometry \
            simbody \
            spdlog \
            gtest \
            pybind11 \
            nlohmann-json

      - name: Configure CMake (integrated build)
        run: |
          cmake -G Ninja \
            -D CMAKE_BUILD_TYPE=Release \
            -D CMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -D CMAKE_C_COMPILER_LAUNCHER=ccache \
            -D CMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -D Python3_EXECUTABLE=$(which python3) \
            -D SPHINXSYS_BUILD_TESTS=OFF \
            -D SPHINXSYS_DEVELOPER_MODE=OFF \
            -D SPHINXSYS_USE_SYCL=OFF \
            -D SPHINXSYS_2D=ON \
            -D SPHINXSYS_3D=ON \
            -S ${{ github.workspace }} \
            -B ${{ github.workspace }}/build-integrated

      - name: Build
        run: |
          cmake --build ${{ github.workspace }}/build-integrated \
            --config Release \
            --parallel $(nproc)

      - name: Run C++ simulation class tests (ctest)
        run: |
          ctest --test-dir ${{ github.workspace }}/build-integrated \
            --output-on-failure \
            -R "test_(2d|3d)_simulation$"

      - name: Install Python package (editable with dev dependencies)
        run: |
          pip install -e ".[dev]"

      - name: Run unit tests (tests/)
        run: |
          pytest tests/ -v

      - name: Run example tests (examples/)
        run: |
          pytest examples/ -v
